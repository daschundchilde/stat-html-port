<!DOCTYPE html>

<head>

    <title>Contact | Jazzpher Garcia</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
            border-radius: 12px;
            font-weight: 700;
            color: white !important;
            transition: transform 0.3s ease;
        }
        .contact-btn:hover {
            transform: scale(1.05);
            text-shadow: none;
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="logo">
            <img src="img/idpicnew2026.JPG" alt="Jazzpher Garcia">
            <span>Jazzpher Garcia</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="articles.html">Articles</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <section class="hero" style="min-height: 40vh;">
        <div class="container">
            <h1>GET_IN_TOUCH</h1>
            <p>I'm always open to discussing new projects, creative ideas, or opportunities to be part of your vision.</p>
        </div>
    </section>

    <section class="section container">
        <div class="card" style="text-align: center;">
            <h2 class="mono">CONNECT_WITH_ME</h2>
            <div class="contact-grid">
                <a href="https://www.facebook.com/schsnd" target="_blank" class="contact-btn" style="background: #1877f2;">Facebook</a>
                <a href="https://www.instagram.com/schub_0/" target="_blank" class="contact-btn" style="background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);">Instagram</a>
                <a href="https://github.com/daschundchilde" target="_blank" class="contact-btn" style="background: #24292e;">GitHub</a>
                <a href="mailto:garciajazzpher@gmail.com" target="_blank" class="contact-btn" style="background: #ea4335;">Gmail</a>
                <a href="#" target="_blank" class="contact-btn" style="background: #000000;">TikTok</a>
            </div>
        </div>
    </section>
</main>

<footer>
    <div class="container">
        <p>&copy; 2026 Jazzpher Garcia. Built with passion and Code.</p>
